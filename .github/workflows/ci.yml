name: CI - Tests del proyecto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r config/requirements.txt

      - name: Verificar que los módulos del proyecto importan correctamente
        run: |
          python -c "import src.calidad_datos"
          python -c "import src.preparacion_datos"
          python -c "import src.modelado"

      - name: Verificar sintaxis de scripts y pipelines
        run: |
          python -m py_compile pipelines/*.py
          python -m py_compile api/main.py
          python -m py_compile app/streamlit_app.py

      - name: Nota
        run: echo "Los tests con datos (calidad de datos y evaluacion del modelo) requieren un remoto DVC configurado para ejecutarse en CI. Se ejecutan localmente antes de cada entrega (ver memoria de trabajo)."
